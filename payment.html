<!DOCTYPE html>
<html>
  <head>
    <title>Simple JavaScript Calculator</title>

    <script>
      function calc() {
        let PV= document.getElementById("PV").value;
        let n= document.getElementById("n").value;
        let r= document.getElementById("r").value;
        
        let P = ((r/100/12) * PV) / (1-(1+(r/100/12))**-(n*12));
        document.getElementById("loan").innerHTML = PV;
        document.getElementById("years").innerHTML = n;
        document.getElementById("rate").innerHTML = r;
        document.getElementById("ans").innerHTML = P.toFixed(2);
      }
    </script>
  </head>
  <body>

    <h3>This is a simple JavaScript and HTML calculator.</h3>

    <p><input id="PV"> Loan amount ($) </p>
    <p><input id="n"> Loan length in years </p>
    <p><input id="r">% - Annual interest rate </p>
    <p>
      <button onclick="calc()"> Calculate Your Monthly Payment </button>
    </p>
    <p>
      With a loan of $<span id="loan">___</span> over <span id="years">___</span> years, with an annual interest rate of <span id="rate">___</span>%, your payments will be <span id="ans">___</span>.
    </p>
    
  </body>
</html>
