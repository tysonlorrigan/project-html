<!DOCTYPE html>
<html>
  <head>
    <title>Simple JavaScript Calculator</title>

    <script>
      function calc() {
        let PV= document.getElementById("PV").value;
        let n= document.getElementById("n").value;
        let r= document.getElementById("r").value;
        
        let P = ((r/100/12) * PV) / (1-(1+(r/100/12))**-(n*12));
        document.getElementById("ans").innerHTML = "With a loan of $" + PV + " over " + n + " years, with an annual interest rate of " + r + "%, your payment will be $" + P.toFixed(2)".";
      }
    </script>
  </head>
  <body>

    <h3>This is a simple JavaScript and HTML calculator.</h3>

    <p><input id="PV"> Loan amount ($) </p>
    <p><input id="n"> Loan length in years </p>
    <p><input id="r">% - Annual interest rate </p>
    <p>
      <button onclick="calc()"> Calculate Your Monthly Payment </button>
    </p>
    <p>
      <span id="ans"> </span>
    </p>
    
  </body>
</html>
